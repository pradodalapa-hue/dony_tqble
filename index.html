<!DOCTYPE html><html><head><meta charset='UTF-8'></head><body style='background:#000;color:#0f0;text-align:center;padding-top:20%;font-family:sans-serif'><h1>SISTEMA PROTEGIDO JDP</h1><p id='msg'>Validando Acesso...</p><script>async function v(){const m = document.getElementById('msg');if(window.location.hostname !== 'pradodalapa-hue.github.io') {m.innerHTML = '<h2 style="color:red">VIOLAÇÃO DE DOMÍNIO</h2>'; return; }try {const r = await fetch('https://raw.githubusercontent.com/pradodalapa-hue/Tetstserbidor/main/clientes.json?t=' + Date.now());const d = await r.json();const u = d.find(i => i.apiKey === 'Q2xpZW50ZTIy');if(u && u.status === 'ativo') {m.innerText = 'Liberando...';const r2 = await fetch('https://raw.githubusercontent.com/pradodalapa-hue/Tetstserbidor/main/' + u.source + '?t=' + Date.now());const d2 = await r2.json();const cod = decodeURIComponent(escape(atob(d2.payload)));document.open(); document.write(cod); document.close();} else if(u && u.status === 'bloqueado') {m.innerHTML = '<h2 style="color:red">ACESSO SUSPENSO</h2><p>Contate a JDP INDUSTRIAL.</p>';} else { m.innerHTML = '<h2 style="color:red">CHAVE INVÁLIDA</h2>'; }} catch(e) { m.innerText = 'ERRO DE CONEXÃO'; }} v();</script></body></html>
